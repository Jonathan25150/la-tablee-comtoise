    <title> Page contact - La tablée Comtoise</title>

  <body>
    <header>
      <div class="header-top">
        <h1 class="logo">La Tablée Comtoise</h1>
        <p>Simplicité, rapdidité ... et surtout gourmand !</p>
      </div>
      <nav class="navbar">
        <ul class="links">
          <li><a href="index.html">Accueil</a></li>
          <li><a href="page-articles.html"> Recettes </a></li>
          <li><a href="a-propos.html"> À propos </a></li>
          <li><a href="contact.html"> Contact</a></li>
        </ul>
      </nav>
      <div class="img-banniere"></div>
    </header>
    <main>
      <form>
        <h2>Nous contacter</h2>
        <fieldset>
        <div>
        <label for="inputname">Nom</label>
        <input type="text" id="inputname" placeholder="Votre Nom" required>
        </div>
        <div>
          <label for="inputprenom"> Prénom</label>
          <input type="text" id="inputprenom" placeholder="Votre Prenom" required>
        </div>
      <div>
        <label for="emailinput"> Email</label>
        <input type="email" id="emailinput" placeholder="Votre adresse mail" required>
      </div>
      <div>
        <label for="message"> Votre message</label>
      <textarea id="message" name="message" rows="10" cols="42" placeholder="Votre message" required> </textarea>
      </div>
      
<div class="checkbox-group">
  <input type="checkbox" id="consent" required>
  <label for="consent">J’accepte l’utilisation de mes données</label>
</div>

      <button type="submit"> Envoyer </button>
      </form>
        </fieldset>
    </main>
  </body>
  <footer>
    <div class="footer-left">
      <p class="logo-footer">La Tablée Comtoise</p>
      <p>Cuisine comtoise simple, rapide et gourmande.</p>
